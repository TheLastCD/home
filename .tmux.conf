setw -g mouse on
set-option -g allow-rename on
set -g default-terminal "tmux-256color"
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 2
set-window-option -g automatic-rename off
set-option -g renumber-windows on
set-option -a terminal-features 'xterm-kitty:RGB'
set -g status-bg default
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
set-option -g status-position top

bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

run-shell ~/tmuxlog/logging.tmux

# List of plugins
set -g @treemux-tree-nvim-init-file '~/.tmux/plugins/treemux/configs/treemux_init.lua'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'kiyoon/treemux'
#set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexchaichan/tmux-spotify-tui'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'pwittchen/tmux-plugin-spotify'
set -g @plugin 'lloydbond/tmux-floating-terminal'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'trevarj/tmux-open-nvim'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin '2kabhishek/tmux2k'


# Configure the catppuccin plugin
